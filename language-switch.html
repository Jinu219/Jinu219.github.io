<script>
(() => {
  const localizeNavigation = () => {
    const path = window.location.pathname;
    const isEnglish = path === "/en" || path.startsWith("/en/");
    const switchLink =
      document.querySelector('a[aria-label="Switch language"]') ||
      [...document.querySelectorAll(".navbar-nav .nav-link")].find((link) =>
        ["EN", "KO"].includes(link.textContent.trim())
      );

    if (switchLink) {
      const englishPath = path === "/" || path === "/index.html"
        ? "/en/"
        : `/en${path}`;
      const koreanPath = path === "/en" || path === "/en/" || path === "/en/index.html"
        ? "/"
        : path.replace(/^\/en/, "");
      const label = switchLink.querySelector(".menu-text") || switchLink;

      label.textContent = isEnglish ? "KO" : "EN";
      switchLink.href = `${isEnglish ? koreanPath : englishPath}${window.location.search}${window.location.hash}`;
      switchLink.setAttribute(
        "aria-label",
        isEnglish ? "한국어로 전환" : "Switch to English"
      );
      switchLink.classList.remove("active");
      switchLink.removeAttribute("aria-current");
    }

    if (!isEnglish) return;

    const brand = document.querySelector(".navbar-brand");
    if (brand) brand.href = "/en/";

    const menu = [
      ["PySDM", "PySDM", "/en/pysdm.html"],
      ["WRF", "WRF", "/en/wrf.html"],
      ["Article Review", "Article Review", "/en/article-review.html"]
    ];

    document.querySelectorAll(".navbar-nav .nav-link").forEach((link) => {
      const label = link.querySelector(".menu-text") || link;
      const item = menu.find(([korean]) => label.textContent.trim() === korean);
      if (!item) return;
      label.textContent = item[1];
      link.href = item[2];

      const isCurrent = path === item[2] ||
        (item[2] === "/en/" && ["/en", "/en/", "/en/index.html"].includes(path));
      link.classList.toggle("active", isCurrent);
      if (isCurrent) link.setAttribute("aria-current", "page");
      else link.removeAttribute("aria-current");
    });

    document.querySelectorAll(".nav-footer a").forEach((link) => {
      if (link.textContent.trim() === "소개") {
        link.textContent = "About";
        link.href = "/en/about.html";
      }
      if (link.textContent.trim() === "RSS") link.href = "/index.xml";
    });
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", localizeNavigation);
  } else {
    localizeNavigation();
  }
})();
</script>
