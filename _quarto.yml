project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "en/**/*.qmd"
    - "!_templates/**"

website:
  title: "Jinu's Cloud Seeding Blog"
  site-url: "https://jinu219.github.io"
  description: "PySDM, WRF, 논문 리뷰를 통해 구름 씨뿌리기 연구를 배우고 기록합니다."
  repo-url: "https://github.com/Jinu219/Jinu219.github.io"
  repo-actions: [source, issue]
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    left:
      - href: pysdm.qmd
        text: PySDM
      - href: wrf.qmd
        text: WRF
      - href: article-review.qmd
        text: Article Review
    right:
      - text: "EN"
        href: en/index.qmd
        aria-label: "Switch language"
      - icon: github
        href: "https://github.com/Jinu219"
        aria-label: Jinu219 GitHub
  page-footer:
    border: true
    left: "© 2026 Jinu. Cloud seeding research notes."
    right:
      - text: "소개"
        href: about.qmd
      - text: "RSS"
        href: index.xml
      - text: "GitHub"
        href: "https://github.com/Jinu219"

lang: ko
date-format: "YYYY-MM-DD"
bibliography: references.bib

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-link: true
    anchor-sections: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    include-after-body: language-switch.html

execute:
  freeze: auto
