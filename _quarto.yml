project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "en/**/*.qmd"
    - "!_templates/**"

website:
  title: "Jinu's Cloud Seeding Blog"
  site-url: "https://jinu219.github.io"
  description: "PySDM, WRF, 논문 리뷰를 통해 구름 씨뿌리기 연구를 배우고 기록합니다."
  repo-url: "https://github.com/Jinu219/Jinu219.github.io"
  repo-actions: [source, issue]
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    left:
      - href: pysdm.qmd
        text: PySDM
      - href: wrf.qmd
        text: WRF
      - href: article-review.qmd
        text: Article Review
    right:
      - text: "EN"
        href: en/index.qmd
        aria-label: "Switch language"
      - icon: github
        href: "https://github.com/Jinu219"
        aria-label: Jinu219 GitHub
  sidebar:
    - id: pysdm-ko
      title: "PySDM Lab"
      style: docked
      background: light
      border: true
      collapse-level: 2
      contents:
        - href: pysdm.qmd
          text: "PySDM 개요"
        - section: "Learn PySDM"
          contents:
            - href: posts/learn-pysdm/2026-07-15-first-steps/index.qmd
              text: "PySDM 시작하기"
        - section: "Build the Lab"
          href: build-the-lab.qmd
          contents:
            - href: posts/build-the-lab/2026-07-13-scenario-workflow/index.qmd
              text: "스크립트에서 실험실로"
            - href: posts/build-the-lab/2026-07-14-research-quality/index.qmd
              text: "결과를 믿을 수 있는 코드"
            - href: posts/build-the-lab/2026-07-16-rain-server-execution/index.qmd
              text: "강수 검증과 서버 실행"
            - href: posts/build-the-lab/2026-07-21-v1-research-workflow/index.qmd
              text: "실험 코드에서 연구 워크플로로"
        - section: "Experiments"
          href: experiments.qmd
          contents:
            - href: posts/experiments/2026-06-30-numerical-representation/index.qmd
              text: "1. 수치 표현 민감도"
            - href: posts/experiments/2026-07-03-parameter-sensitivity/index.qmd
              text: "2. 시딩 조건 민감도"
            - href: posts/experiments/2026-07-06-realistic-warm-seeding/index.qmd
              text: "3. 현실 배경환경"
            - href: posts/experiments/2026-07-08-efficiency-response-surface/index.qmd
              text: "4. Response surface"
        - href: "https://github.com/Jinu219/PySDM-Seeding-Lab"
          text: "Seeding Lab 코드 ↗"
    - id: pysdm-en
      title: "PySDM Lab"
      style: docked
      background: light
      border: true
      collapse-level: 2
      contents:
        - href: en/pysdm.qmd
          text: "PySDM overview"
        - section: "Learn PySDM"
          contents:
            - href: en/posts/learn-pysdm/2026-07-15-first-steps/index.qmd
              text: "Getting started"
        - section: "Build the Lab"
          href: en/build-the-lab.qmd
          contents:
            - href: en/posts/build-the-lab/2026-07-13-scenario-workflow/index.qmd
              text: "From scripts to a lab"
            - href: en/posts/build-the-lab/2026-07-14-research-quality/index.qmd
              text: "Making results trustworthy"
            - href: en/posts/build-the-lab/2026-07-16-rain-server-execution/index.qmd
              text: "Rain qualification & server"
            - href: en/posts/build-the-lab/2026-07-21-v1-research-workflow/index.qmd
              text: "From code to research workflow"
        - section: "Experiments"
          href: en/experiments.qmd
          contents:
            - href: en/posts/experiments/2026-06-30-numerical-representation/index.qmd
              text: "1. Numerical representation"
            - href: en/posts/experiments/2026-07-03-parameter-sensitivity/index.qmd
              text: "2. Seeding sensitivity"
            - href: en/posts/experiments/2026-07-06-realistic-warm-seeding/index.qmd
              text: "3. Realistic backgrounds"
            - href: en/posts/experiments/2026-07-08-efficiency-response-surface/index.qmd
              text: "4. Response surface"
        - href: "https://github.com/Jinu219/PySDM-Seeding-Lab"
          text: "Seeding Lab code ↗"
  page-footer:
    border: true
    left: "© 2026 Jinu. Cloud seeding research notes."
    right:
      - text: "소개"
        href: about.qmd
      - text: "RSS"
        href: index.xml
      - text: "GitHub"
        href: "https://github.com/Jinu219"

lang: ko
date-format: "YYYY-MM-DD"
bibliography: references.bib

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-link: true
    anchor-sections: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    include-after-body: language-switch.html

execute:
  freeze: auto
