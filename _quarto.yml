project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "en/**/*.qmd"
    - "!_templates/**"

website:
  title: "Jinu's Cloud Seeding Blog"
  site-url: "https://jinu219.github.io"
  description: "PySDM, WRF, 논문 리뷰를 통해 구름 씨뿌리기 연구를 배우고 기록합니다."
  repo-url: "https://github.com/Jinu219/Jinu219.github.io"
  repo-actions: [source, issue]
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    left:
      - href: pysdm.qmd
        text: PySDM
      - href: wrf.qmd
        text: WRF
      - href: article-review.qmd
        text: Article Review
    right:
      - text: "EN"
        href: en/index.qmd
        aria-label: "Switch language"
      - icon: github
        href: "https://github.com/Jinu219"
        aria-label: Jinu219 GitHub
  sidebar:
    - id: pysdm-ko
      title: "PySDM Lab"
      style: docked
      background: light
      border: true
      collapse-level: 2
      contents:
        - href: pysdm.qmd
          text: "PySDM 개요"
        - section: "Learn PySDM"
          contents:
            - href: posts/learn-pysdm/2026-07-15-first-steps/index.qmd
              text: "PySDM 시작하기"
        - href: build-the-lab.qmd
          text: "Build the Lab"
        - href: experiments.qmd
          text: "Experiments"
        - href: "https://github.com/Jinu219/PySDM-Seeding-Lab"
          text: "실험 코드 ↗"
    - id: pysdm-en
      title: "PySDM Lab"
      style: docked
      background: light
      border: true
      collapse-level: 2
      contents:
        - href: en/pysdm.qmd
          text: "PySDM overview"
        - section: "Learn PySDM"
          contents:
            - href: en/posts/learn-pysdm/2026-07-15-first-steps/index.qmd
              text: "Getting started"
        - href: en/build-the-lab.qmd
          text: "Build the Lab"
        - href: en/experiments.qmd
          text: "Experiments"
        - href: "https://github.com/Jinu219/PySDM-Seeding-Lab"
          text: "Experiment code ↗"
  page-footer:
    border: true
    left: "© 2026 Jinu. Cloud seeding research notes."
    right:
      - text: "소개"
        href: about.qmd
      - text: "RSS"
        href: index.xml
      - text: "GitHub"
        href: "https://github.com/Jinu219"

lang: ko
date-format: "YYYY-MM-DD"
bibliography: references.bib

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-link: true
    anchor-sections: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    include-after-body: language-switch.html

execute:
  freeze: auto
